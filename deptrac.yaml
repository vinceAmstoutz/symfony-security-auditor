deptrac:
  paths:
    - ./src
  layers:
    - name: Domain
      collectors:
        - type: directory
          value: src/Audit/Domain/.*
    - name: Application
      collectors:
        - type: directory
          value: src/Audit/Application/.*
    - name: Infrastructure
      collectors:
        - type: directory
          value: src/Audit/Infrastructure/.*
    - name: Command
      collectors:
        - type: directory
          value: src/Command/.*
    - name: Bundle
      collectors:
        - type: classLike
          value: VinceAmstoutz\\SymfonySecurityAuditor\\SymfonySecurityAuditorBundle
    - name: Standalone
      collectors:
        - type: directory
          value: src/Standalone/.*
  ruleset:
    Domain: ~
    Application:
      - Domain
    Infrastructure:
      - Domain
      - Application
    Command:
      - Application
      - Domain
      - Infrastructure
    Bundle:
      - Application
      - Domain
      - Infrastructure
      - Command
    Standalone:
      - Bundle
      - Application
      - Domain
      - Infrastructure
      - Command
