<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="generator" content="{{packageName}}" />
    <title>Security Audit Report — {{projectPath}}</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.5;
        margin: 0 auto;
        max-width: 60rem;
        padding: 2rem 1rem;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      .risk {
        display: inline-block;
        font-weight: 700;
        padding: 0.15rem 0.6rem;
        border-radius: 0.4rem;
        color: #fff;
      }
      .risk-critical {
        background: #7f1d1d;
      }
      .risk-high {
        background: #b91c1c;
      }
      .risk-medium {
        background: #b45309;
      }
      .risk-low {
        background: #2563eb;
      }
      .risk-safe {
        background: #15803d;
      }
      dl.meta {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 0.25rem 1rem;
      }
      dl.meta dt {
        font-weight: 600;
      }
      dl.meta dd {
        margin: 0;
      }
      table.summary {
        border-collapse: collapse;
        margin: 1rem 0;
      }
      table.summary th,
      table.summary td {
        border: 1px solid #8884;
        padding: 0.25rem 0.75rem;
        text-align: left;
      }
      .safe {
        color: #15803d;
        font-weight: 600;
      }
      article.finding {
        border: 1px solid #8884;
        border-left-width: 0.4rem;
        border-radius: 0.4rem;
        margin: 1rem 0;
        padding: 0 1rem 1rem;
      }
      article.severity-critical {
        border-left-color: #7f1d1d;
      }
      article.severity-high {
        border-left-color: #b91c1c;
      }
      article.severity-medium {
        border-left-color: #b45309;
      }
      article.severity-low {
        border-left-color: #2563eb;
      }
      article.severity-info {
        border-left-color: #6b7280;
      }
      .badge {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      pre {
        background: #8881;
        border-radius: 0.3rem;
        overflow-x: auto;
        padding: 0.75rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1>Security Audit Report</h1>
    <p>
      Risk level:
      <span class="risk risk-{{riskLevelClass}}">{{riskLevel}}</span> (score
      {{riskScore}})
    </p>
    <dl class="meta">
      <dt>Audit ID</dt>
      <dd>{{auditId}}</dd>
      <dt>Project</dt>
      <dd>{{projectPath}}</dd>
      <dt>Started</dt>
      <dd>{{startedAt}}</dd>
      <dt>Duration</dt>
      <dd>{{duration}}</dd>
      <dt>Files scanned</dt>
      <dd>{{filesScanned}}</dd>
      <dt>Tokens</dt>
      <dd>{{tokens}}</dd>
      <dt>Model</dt>
      <dd>{{primaryModel}}</dd>
    </dl>
    {{summary}} {{body}}
    <footer>
      <p><small>Generated by <a href="{{packageUrl}}">{{packageName}}</a>.</small></p>
    </footer>
  </body>
</html>
