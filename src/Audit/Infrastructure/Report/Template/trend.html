<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="generator" content="{{packageName}}" />
    <title>Security Findings Trend — {{reportCount}} reports</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.5;
        margin: 0 auto;
        max-width: 60rem;
        padding: 2rem 1rem;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      figure.chart {
        margin: 1.5rem 0;
      }
      figure.chart svg {
        height: auto;
        max-width: 100%;
      }
      figure.chart figcaption {
        color: #6b7280;
        font-size: 0.85rem;
      }
      .line {
        fill: none;
        stroke: #2563eb;
        stroke-width: 2;
      }
      .area {
        fill: #2563eb;
        fill-opacity: 0.12;
      }
      .marker {
        fill: #2563eb;
      }
      .axis,
      .grid {
        stroke: #8884;
        stroke-width: 1;
      }
      .tick {
        fill: #6b7280;
        font-size: 10px;
      }
      .value {
        fill: currentColor;
        font-size: 11px;
        font-weight: 600;
      }
      table.trend {
        border-collapse: collapse;
        margin: 1rem 0;
      }
      table.trend th,
      table.trend td {
        border: 1px solid #8884;
        padding: 0.25rem 0.75rem;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <h1>Security Findings Trend</h1>
    <p>{{summary}}</p>
    <figure class="chart">
      {{chart}}
      <figcaption>Validated finding totals per report, oldest to newest.</figcaption>
    </figure>
    <table class="trend">
      <caption>
        Reports, oldest to newest
      </caption>
      <thead>
        <tr>
          <th>#</th>
          <th>Report</th>
          <th>Total</th>
          <th>New</th>
          <th>Fixed</th>
        </tr>
      </thead>
      <tbody>
        {{rows}}
      </tbody>
    </table>
    <footer>
      <p><small>Generated by <a href="{{packageUrl}}">{{packageName}}</a>.</small></p>
    </footer>
  </body>
</html>
