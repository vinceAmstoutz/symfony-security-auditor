name: Bug report
description: Report something not working as expected.
title: "fix: <short description>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in the sections below so the bug can be
        reproduced and fixed quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-paragraph description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug. Include the exact `audit:run` command/options used.
      placeholder: |
        1. Configure `symfony_security_auditor.yaml` with …
        2. Run `bin/console audit:run …`
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead. Paste the exact error output verbatim (use a code block).
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Fill in versions. Get the auditor version from `composer show symfony-security-auditor`.
      value: |
        - Auditor version:
        - PHP version:
        - Symfony version:
        - LLM provider & model:
        - OS:
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Your `symfony_security_auditor.yaml` (redact API keys/secrets).
      render: yaml
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I redacted any API keys, secrets, and proprietary code from this report.
          required: true