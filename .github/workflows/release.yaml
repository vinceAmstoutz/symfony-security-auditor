name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: ~

permissions:
  contents: write

jobs:
  phar:
    name: Build and attach the PHAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: box
          ini-values: phar.readonly=0

      - name: Install production dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev

      - name: Compile the PHAR
        run: box compile --no-interaction

      - name: Verify the PHAR was produced
        run: test -s symfony-security-auditor.phar

      - name: Attach the PHAR to the release
        uses: softprops/action-gh-release@v2
        with:
          files: symfony-security-auditor.phar
