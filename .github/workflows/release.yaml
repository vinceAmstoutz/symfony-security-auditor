name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build and attach the binaries to (e.g. 1.13.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  phar:
    name: Compile the PHAR (build input for the binaries)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.3'
          coverage: none
          tools: box
          ini-values: phar.readonly=0

      - name: Install production dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev

      - name: Compile the PHAR
        run: box compile --no-interaction

      - name: Verify the PHAR was produced
        run: test -s symfony-security-auditor.phar

      - name: Upload the PHAR build input with its dependency lock
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: symfony-security-auditor-phar
          path: |
            symfony-security-auditor.phar
            composer.lock
          retention-days: 1
          compression-level: 9

  binary:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    needs: phar
    permissions:
      contents: write
    env:
      SPC_VERSION: '2.8.5'

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: symfony-security-auditor-linux-x86_64
            spc: spc-linux-x86_64
          - runner: ubuntu-24.04-arm
            asset: symfony-security-auditor-linux-aarch64
            spc: spc-linux-aarch64
          - runner: macos-15-intel
            asset: symfony-security-auditor-macos-x86_64
            spc: spc-macos-x86_64
          - runner: macos-14
            asset: symfony-security-auditor-macos-arm64
            spc: spc-macos-aarch64
          # Pinned to windows-2022: spc 2.8.5 locates Visual Studio through a
          # hardcoded list of VS 2019/2022 paths, and windows-latest ships
          # VS 2026 (no VS 2022) since GitHub's June 2026 image migration.
          - runner: windows-2022
            asset: symfony-security-auditor-windows-x86_64.exe
            spc: spc-windows-x64.exe
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Setup static-php-cli (pinned stable release)
        run: |
          case "${{ matrix.spc }}" in
            *.exe)
              curl -fsSL --retry 3 -o spc.exe "https://github.com/crazywhalecc/static-php-cli/releases/download/${SPC_VERSION}/${{ matrix.spc }}"
              ;;
            *)
              curl -fsSL --retry 3 "https://github.com/crazywhalecc/static-php-cli/releases/download/${SPC_VERSION}/${{ matrix.spc }}.tar.gz" | tar -xz
              chmod +x spc
              ;;
          esac
          ./spc --version

      - name: Prepare the build environment (installs pkg-config, autoconf, …)
        env:
          # doctor --auto-fix downloads pkg-config from the GitHub API too;
          # authenticate it for the same reason the build step is (avoid the
          # unauthenticated 60-req/hour limit intermittently 403-ing the fix).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Preinstall doctor's Linux packages with apt retries and forced
          # IPv4: doctor's own single-try 'apt-get install re2c autopoint'
          # fails the job whenever the runner's mirror flakes (ports.ubuntu.com
          # on arm64 times out intermittently and has no IPv6 route). Retries
          # cannot outlast a sustained mirror outage, so fall back to the same
          # pinned .debs straight from Launchpad — Canonical's package origin
          # on separate infrastructure, which keeps every published version.
          # The fallback bypasses APT's signature chain, so each .deb is pinned
          # to the SHA-256 published in Ubuntu's signed noble Packages index and
          # verified before install; a mismatch aborts the release build.
          if [ "$RUNNER_OS" = "Linux" ]; then
            if ! { sudo apt-get update -o Acquire::Retries=3 -o Acquire::ForceIPv4=true \
                && sudo apt-get install -y -o Acquire::Retries=3 -o Acquire::ForceIPv4=true re2c autopoint; }; then
              set -euo pipefail
              arch="$(dpkg --print-architecture)"
              autopoint_sha256="42853d892435cf2ed08dfda92ba77b13bca85f31689256096415921d00cd59c8"
              case "$arch" in
                amd64) re2c_sha256="418afd09a7abb6878ddec36b60cefb891a8066856a60b757fd0700e072652616" ;;
                arm64) re2c_sha256="428bb627a228ce9ac0d0d0db7705578ea89ce2c52c67c8ce3a046676f3d4e002" ;;
                *) echo "::error::no pinned re2c .deb checksum for architecture ${arch}"; exit 1 ;;
              esac
              curl -fsSL --retry 3 -o /tmp/autopoint.deb "https://launchpad.net/ubuntu/+archive/primary/+files/autopoint_0.21-14ubuntu2_all.deb"
              curl -fsSL --retry 3 -o /tmp/re2c.deb "https://launchpad.net/ubuntu/+archive/primary/+files/re2c_3.1-1build1_${arch}.deb"
              echo "${autopoint_sha256}  /tmp/autopoint.deb" | sha256sum -c -
              echo "${re2c_sha256}  /tmp/re2c.deb" | sha256sum -c -
              sudo dpkg -i /tmp/autopoint.deb /tmp/re2c.deb
            fi
          fi
          # The macOS runner image ships the aws/tap Homebrew tap, which
          # Homebrew's tap-trust policy distrusts — every brew call doctor
          # makes then emits a warning annotation. Nothing here uses that
          # tap, so drop it (untap is Homebrew's own first recommendation).
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew untap aws/tap || true
          fi
          # Must pass everywhere: on Unix it installs pkg-config/autoconf; on
          # Windows it installs php-sdk-binary-tools, whose 7za.exe spc's
          # source extraction silently depends on (exit codes are discarded).
          ./spc doctor --auto-fix

      - name: Download the PHAR build input
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: symfony-security-auditor-phar

      - name: Resolve the required extensions plus zlib for the gz-compressed PHAR
        id: extensions
        run: |
          # `spc dump-extensions` scans source usage and emits always-compiled
          # PHP core extensions (date, …) that `spc download`/`build` reject as
          # non-buildable packages; drop them, then append zlib for the
          # GZ-compressed PHAR wrapper (box.json `compression: GZ`).
          raw="$(./spc dump-extensions . --format=text)"
          filtered="$(printf '%s' "$raw" | tr ',' '\n' \
            | grep -vxE 'core|standard|date|hash|json|pcre|spl|reflection|random|zlib' \
            | paste -sd, -)"
          echo "list=${filtered},zlib" >> "$GITHUB_OUTPUT"

      - name: Build the static micro PHP runtime
        env:
          # Authenticate spc's --prefer-pre-built queries to the GitHub API
          # (static-php-cli-hosted/releases); the unauthenticated 60-req/hour
          # limit intermittently 403s a subset of the matrix.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXTENSIONS_LIST: ${{ steps.extensions.outputs.list }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # spc extracts archives through cmd.exe pipelines ("7za x -so … |
            # tar -x -C D:\…"). Git bash puts MSYS GNU tar first on PATH, and
            # it cannot open C:\-style destination paths; spc's Windows
            # extraction is written against System32's bsdtar, so put it first.
            export PATH="/c/Windows/System32:$PATH"
          fi
          ./spc download --for-extensions="$EXTENSIONS_LIST" --with-php=8.3 --prefer-pre-built
          if [ "$RUNNER_OS" = "Windows" ]; then
            # spc discards extraction exit codes on Windows (bsdtar returns 1
            # on symlink warnings), so a failed extraction resurfaces as an
            # opaque TypeError mid-build. Extract php-src in its own fail-fast
            # step and assert the tree is real before compiling; the build
            # then reuses it via the .spc-hash lock instead of re-extracting.
            ./spc extract php-src,micro --source-only
            if [ ! -s source/php-src/main/php_version.h ]; then
              echo "php-src extraction is incomplete (spc swallows Windows 7za/tar failures)" >&2
              exit 1
            fi
          fi
          ./spc build "$EXTENSIONS_LIST" --build-micro

      - name: Combine the micro runtime with the PHAR
        run: ./spc micro:combine symfony-security-auditor.phar --output="${{ matrix.asset }}"

      - name: Verify the binary was produced
        run: test -s "${{ matrix.asset }}"

      - name: Smoke-test the binary
        run: |
          chmod +x "${{ matrix.asset }}" 2>/dev/null || true
          ./"${{ matrix.asset }}" --version

      - name: Generate the SHA-256 checksum
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Attach the binary and checksum to the release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # zizmor: ignore[superfluous-actions] v3.0.2 -- not a security issue per zizmor's own docs; migrating to `gh release` is a separate follow-up
        with:
          # A release event carries its own tag context; a workflow_dispatch
          # rebuild does not, so target the tag explicitly (the input on
          # dispatch, the pushed tag on a release event).
          tag_name: ${{ inputs.tag || github.ref_name }}
          # Replace an asset of the same name instead of erroring or
          # accumulating duplicates when the workflow is re-dispatched to
          # repair a partially-published release.
          overwrite_files: true
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  prune:
    name: Prune stale release assets
    runs-on: ubuntu-latest
    needs: binary
    permissions:
      contents: write
    steps:
      - name: Delete release assets no longer produced by the build matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # Assets this release should carry — keep in sync with the binary
          # matrix above. Any other asset under our own name prefix (e.g. a
          # binary from a since-renamed platform slug like the old `darwin-*`)
          # is an orphan left behind by overwrite_files and gets pruned, so a
          # rebuild after a rename/removal self-heals instead of accumulating
          # duplicates.
          keep='
          symfony-security-auditor-linux-x86_64
          symfony-security-auditor-linux-aarch64
          symfony-security-auditor-macos-x86_64
          symfony-security-auditor-macos-arm64
          symfony-security-auditor-windows-x86_64.exe
          '
          allow=""
          for name in $keep; do
            allow="${allow} ${name} ${name}.sha256"
          done

          gh release view "$TAG" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            case "$asset" in
              symfony-security-auditor-*) ;;
              *) continue ;;
            esac
            case " $allow " in
              *" $asset "*) ;;
              *)
                echo "Pruning stale asset: $asset"
                gh release delete-asset "$TAG" "$asset" --yes
                ;;
            esac
          done
