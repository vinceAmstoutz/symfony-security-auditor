name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

permissions:
  contents: read

jobs:
  prettier:
    name: Prettier Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Run Prettier check MD files
        run: npx --yes prettier@3.6.2 --check "**/*.md"

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          config: .markdownlint-cli2.jsonc
          globs: '**/*.md'

  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run commitlint
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: composer-lint-${{ hashFiles('composer.lock') }}
          restore-keys: composer-lint-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Cache Rector result cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: var/rector
          key: rector-${{ hashFiles('src/**/*.php', 'tests/**/*.php', 'rector.php', 'composer.lock') }}
          restore-keys: rector-

      - name: Cache PHP CS Fixer result cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .php-cs-fixer.cache
          key: php-cs-fixer-${{ hashFiles('src/**/*.php', 'tests/**/*.php', '.php-cs-fixer.dist.php', 'composer.lock') }}
          restore-keys: php-cs-fixer-

      - name: Normalize composer.json
        run: composer normalize --dry-run

      - name: PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --config .php-cs-fixer.dist.php --dry-run --diff

      - name: Rector
        run: vendor/bin/rector process --dry-run

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=500M

      - name: Deptrac
        run: vendor/bin/deptrac analyse --no-progress

      - name: Swiss Knife
        run: |
          vendor/bin/swiss-knife check-commented-code src tests tools
          vendor/bin/swiss-knife check-conflicts src tests tools

      - name: Composer audit
        run: composer audit

      - name: Install script tests
        run: sh tests/Shell/install_script_test.sh

      - name: Install zizmor
        run: pip install --quiet zizmor==1.27.0

      - name: zizmor (GitHub Actions security scan)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: zizmor --min-severity=low .github/workflows action.yml

  tests:
    name: Tests + Mutation (PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        symfony: ['^7.4', '^8.0', '^8.1']
    env:
      SYMFONY_REQUIRE: ${{ matrix.symfony }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: composer-php${{ matrix.php }}-sf${{ matrix.symfony }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-php${{ matrix.php }}-sf${{ matrix.symfony }}-

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Cache PHPUnit result cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .phpunit.cache
          key: phpunit-php${{ matrix.php }}-sf${{ matrix.symfony }}-${{ hashFiles('src/**/*.php', 'tests/**/*.php', 'phpunit.xml', 'composer.json') }}
          restore-keys: phpunit-php${{ matrix.php }}-sf${{ matrix.symfony }}-

      - name: Run test suite with coverage (enforces 100% via MinimumLineCoverageExtension)
        run: |
          bin/phpunit \
            --coverage-clover=build/coverage/clover.xml \
            --coverage-xml=build/coverage/coverage-xml \
            --log-junit=build/coverage/junit.xml \

      - name: Upload coverage to Codecov
        if: matrix.php == '8.3' && matrix.symfony == '^7.4'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: build/coverage/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Run Infection mutation tests
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          INFECTION_DASHBOARD_API_KEY: ${{ secrets.INFECTION_DASHBOARD_API_KEY }}
        run: |
          ARGS="--configuration=infection.json5 --threads=max --coverage=build/coverage --skip-initial-tests --min-msi=100 --min-covered-msi=100"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git fetch --depth=1 origin "$BASE_REF"
            ARGS="$ARGS --git-diff-lines --git-diff-base=origin/$BASE_REF --ignore-msi-with-no-mutations"
          fi
          php -d memory_limit=1G bin/infection $ARGS
