name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prettier:
    name: Prettier Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run Prettier check MD files
        run: npx --yes prettier@3 --check "**/*.md"

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint-cli2.jsonc
          globs: '**/*.md'

  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run commitlint
        uses: wagoid/commitlint-github-action@v6

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-lint-${{ hashFiles('composer.lock') }}
          restore-keys: composer-lint-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Cache Rector result cache
        uses: actions/cache@v5
        with:
          path: var/rector
          key: rector-${{ hashFiles('src/**/*.php', 'tests/**/*.php', 'rector.php', 'composer.lock') }}
          restore-keys: rector-

      - name: Cache PHP CS Fixer result cache
        uses: actions/cache@v5
        with:
          path: .php-cs-fixer.cache
          key: php-cs-fixer-${{ hashFiles('src/**/*.php', 'tests/**/*.php', '.php-cs-fixer.dist.php', 'composer.lock') }}
          restore-keys: php-cs-fixer-

      - name: Normalize composer.json
        run: composer normalize --dry-run

      - name: PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --config .php-cs-fixer.dist.php --dry-run --diff

      - name: Rector
        run: vendor/bin/rector process --dry-run

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=500M

      - name: Deptrac
        run: vendor/bin/deptrac analyse --no-progress

      - name: Swiss Knife
        run: |
          vendor/bin/swiss-knife check-commented-code src tests tools
          vendor/bin/swiss-knife check-conflicts src tests tools

      - name: Composer audit
        run: composer audit

  tests:
    name: Tests + Mutation (PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        symfony: ['^7.4', '^8.0', '^8.1']
    env:
      SYMFONY_REQUIRE: ${{ matrix.symfony }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-php${{ matrix.php }}-sf${{ matrix.symfony }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-php${{ matrix.php }}-sf${{ matrix.symfony }}-

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Cache PHPUnit result cache
        uses: actions/cache@v5
        with:
          path: .phpunit.cache
          key: phpunit-php${{ matrix.php }}-sf${{ matrix.symfony }}-${{ hashFiles('src/**/*.php', 'tests/**/*.php', 'phpunit.xml', 'composer.json') }}
          restore-keys: phpunit-php${{ matrix.php }}-sf${{ matrix.symfony }}-

      - name: Run test suite with coverage (enforces 100% via PHPUnit extension)
        run: |
          bin/phpunit \
            --coverage-clover=build/coverage/clover.xml \
            --coverage-xml=build/coverage/coverage-xml \
            --log-junit=build/coverage/junit.xml \

      - name: Upload coverage to Codecov
        if: matrix.php == '8.3' && matrix.symfony == '^7.4'
        uses: codecov/codecov-action@v5
        with:
          files: build/coverage/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Run Infection mutation tests
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          ARGS="--configuration=infection.json5 --threads=max --coverage=build/coverage --skip-initial-tests --min-msi=100 --min-covered-msi=100"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git fetch --depth=1 origin "$BASE_REF"
            ARGS="$ARGS --git-diff-lines --git-diff-base=origin/$BASE_REF --ignore-msi-with-no-mutations"
          fi
          php -d memory_limit=1G bin/infection $ARGS

      - name: Publish MSI to Stryker dashboard (badge)
        if: github.ref == 'refs/heads/main' && matrix.php == '8.3' && matrix.symfony == '^7.4'
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        run: |
          MSI=$(php -r '$s = json_decode(file_get_contents("infection/summary.json"), true); echo $s["stats"]["msi"];')
          curl -sSf -X PUT \
            "https://dashboard.stryker-mutator.io/api/reports/github.com/vinceamstoutz/symfony-security-auditor/main" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${STRYKER_DASHBOARD_API_KEY}" \
            -d "{\"mutationScore\": ${MSI}}"
